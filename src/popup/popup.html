<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="popup.js"></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="icon">Aa</div>
      <h1 class="title">NotoSansへ置換するやつ</h1>
    </div>

    <div class="status-card">
      <div class="status-row">
        <div class="status-indicator">
          <span class="dot active" id="status-dot"></span>
          <span class="status-text" id="status-text">動作中</span>
        </div>
      </div>
      <p class="description">読みづらいフォントを Noto Sans JP / UDEV Gothic JPDOC に自動置換します</p>
    </div>

    <div class="info-section">
      <h2 class="section-title">置換対象フォント</h2>
      <div class="font-list">
        <span class="font-tag">MS Gothic</span>
        <span class="font-tag">Meiryo</span>
        <span class="font-tag">Yu Gothic</span>
        <span class="font-tag">Segoe UI</span>
        <span class="font-tag">Arial</span>
        <span class="font-tag">Roboto</span>
        <span class="font-tag">Helvetica</span>
        <span class="font-tag">その他</span>
      </div>
    </div>

    <div class="footer">
      <p class="version" id="version">v-.-.-</p>
    </div>
  </div>
</body>

</html>
